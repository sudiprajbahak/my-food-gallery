<html>
<head>
    <title>FOOD GALLERY</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="text-align:center;">MY FOOD GALLERY</h1>

    <table border="4" align="center" cellspacing="10" cellpadding="10">

        <!-- Fast Food -->
        <tr>
            <th colspan="3">Fast Food</th>
        </tr>
        <tr>
            <td align="center">
                <img src="keema noodles.jpg" width="200" height="150" alt="Keema Noodles">
                <p>Keema Noodles</p>
            </td>
            <td align="center">
                <img src="pizza.jpg" width="200" height="150" alt="Pizza">
                <p>Pizza</p>
            </td>
            <td align="center">
                <img src="chicken kati roll.jpg" width="200" height="150" alt="Kati Roll">
                <p>Kati Roll</p>
            </td>
        </tr>

        <!-- Nepali Food -->
        <tr>
            <th colspan="3">Nepali Food</th>
        </tr>
        <tr>
            <td align="center">
                <img src="rice chicken.jpg" width="200" height="150" alt="Rice Chicken">
                <p>Rice Chicken</p>
            </td>
            <td align="center">
                <img src="selroti.jpg" width="200" height="150" alt="Selroti">
                <p>Selroti</p>
            </td>
            <td align="center">
                <img src="yomari.jpg" width="200" height="150" alt="Yomari">
                <p>Yomari</p>
            </td>
        </tr>

        <!-- Dessert -->
        <tr>
            <th colspan="3">Dessert</th>
        </tr>
        <tr>
            <td align="center">
                <img src="ice cream.jpg" width="200" height="150" alt="Ice Cream">
                <p>Ice Cream</p>
            </td>
            <td align="center">
                <img src="cake.jpg" width="200" height="150" alt="Cake">
                <p>Cake</p>
            </td>
            <td align="center">
                <img src="donuts.jpg" width="200" height="150" alt="Donuts">
                <p>Donuts</p>
            </td>
        </tr>

    </table>

</body>
</html>
